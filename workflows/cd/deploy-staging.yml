name: Deploy — Staging

on:
  push:
    branches:
      - 'release/**'
      - 'hotfix/**'

permissions:
  contents: read
  deployments: write

concurrency:
  group: deploy-staging
  cancel-in-progress: false   # Never cancel staging deploys mid-flight

jobs:
  deploy-staging:
    name: deploy / staging
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: ${{ steps.deploy.outputs.url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to staging
        id: deploy
        run: |
          echo "Deploying ${{ github.sha }} to staging environment"
          # TODO: replace with actual deployment command
          echo "url=https://staging.REPLACE-YOUR-APP.example.com" >> $GITHUB_OUTPUT
