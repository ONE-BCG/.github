name: Deploy — Dev

on:
  push:
    branches: [develop]

permissions:
  contents: read
  deployments: write

concurrency:
  group: deploy-dev
  cancel-in-progress: true

jobs:
  deploy-dev:
    name: deploy / dev
    runs-on: ubuntu-latest
    environment:
      name: dev
      url: ${{ steps.deploy.outputs.url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Replace the step below with your actual deployment mechanism ──────
      # Examples: AWS ECS, Azure App Service, Kubernetes, etc.
      - name: Deploy to dev
        id: deploy
        run: |
          echo "Deploying ${{ github.sha }} to dev environment"
          # TODO: replace with actual deployment command
          echo "url=https://dev.REPLACE-YOUR-APP.example.com" >> $GITHUB_OUTPUT
