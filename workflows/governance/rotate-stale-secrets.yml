name: Rotate Stale Secrets (Reminder)

on:
  schedule:
    # Run every Monday at 07:00 UTC
    - cron: '0 7 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check-expiring-secrets:
    name: check expiring secrets
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Find secrets expiring within 30 days
        id: expiry
        env:
          GH_TOKEN: ${{ secrets.ORG_PROVISIONING_PAT }}
          ORG: ${{ github.repository_owner }}
          DAYS_WARNING: 30
        run: |
          # Convention: secrets whose names end in _EXPIRES_YYYYMMDD are checked.
          # Example: STRIPE_API_KEY_EXPIRES_20261201
          EXPIRING=""
          TODAY=$(date -u +%Y%m%d)
          THRESHOLD=$(date -u -d "+${DAYS_WARNING} days" +%Y%m%d 2>/dev/null \
            || date -u -v+${DAYS_WARNING}d +%Y%m%d)  # macOS fallback

          echo "Checking org secrets for names matching *_EXPIRES_YYYYMMDD"
          SECRETS=$(gh api "orgs/$ORG/actions/secrets" --paginate \
            --jq '[.secrets[].name]' \
            | python3 -c "import json,sys; print('\n'.join(json.load(sys.stdin)))" 2>/dev/null || echo "")

          while IFS= read -r SECRET; do
            EXPIRY_DATE=$(echo "$SECRET" | grep -oP '_EXPIRES_\K\d{8}$' || true)
            if [ -z "$EXPIRY_DATE" ]; then continue; fi

            if [ "$EXPIRY_DATE" -le "$THRESHOLD" ]; then
              DAYS_LEFT=$(python3 -c "from datetime import date; \
                d1=date(int('$EXPIRY_DATE'[:4]),int('$EXPIRY_DATE'[4:6]),int('$EXPIRY_DATE'[6:])); \
                d2=date.today(); print((d1-d2).days)")
              EXPIRING="$EXPIRING\n- \`$SECRET\` — expires in **${DAYS_LEFT} days** ($EXPIRY_DATE)"
            fi
          done <<< "$SECRETS"

          echo "expiring<<EOF" >> $GITHUB_OUTPUT
          printf "$EXPIRING" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Raise issue for expiring secrets
        if: steps.expiry.outputs.expiring != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GOOGLE_CHAT_WEBHOOK_URL: ${{ secrets.GOOGLE_CHAT_WEBHOOK_URL }}
        run: |
          BODY="## Secrets Expiring Within 30 Days\n\nThe following org-level secrets are approaching expiry and should be rotated:\n${{ steps.expiry.outputs.expiring }}\n\n**Action required:** Rotate the credentials and update the secret value in GitHub, then rename the secret to reflect the new expiry date.\n\n_Generated: $(date -u)_"

          gh issue create \
            --title "Action required: secrets expiring soon — $(date -u +%Y-%m-%d)" \
            --body "$BODY" \
            --label "security" \
            --repo ${{ github.repository }} || true

          if [ -n "$GOOGLE_CHAT_WEBHOOK_URL" ]; then
            MSG="*[ONEBCG] Secrets expiring within 30 days — action required*\n${{ steps.expiry.outputs.expiring }}"
            curl -s -X POST "$GOOGLE_CHAT_WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -d "{\"text\": \"$MSG\"}"
          fi
