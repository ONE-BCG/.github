name: Dependency Review

on:
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    name: dependency-review
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          # Block PRs that introduce dependencies with high or critical CVEs.
          fail-on-severity: high
          # Deny licences that are incompatible with commercial use.
          deny-licenses: GPL-2.0, GPL-3.0, AGPL-3.0, LGPL-2.0, LGPL-2.1, LGPL-3.0
          # Post a summary comment on the PR.
          comment-summary-in-pr: always
          # Warn (don't fail) on moderate vulnerabilities.
          warn-on-openssf-scorecard-level: 5
