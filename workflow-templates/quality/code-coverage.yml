name: Code Coverage

on:
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  pull-requests: write

env:
  # Minimum coverage percentage required. PRs that drop below this threshold will fail.
  COVERAGE_THRESHOLD: 80

jobs:
  coverage:
    name: coverage
    runs-on: ubuntu-latest
