name: "User Story"
description: "Create a user story with detailed requirements and documentation"
labels:
  - Title

body:

  - type: textarea
    id: description
    attributes:
      label: Description
      placeholder: "Add user story details"
    validations:
      required: false

  - type: input
    id: intent_md
    attributes:
      label: Intent.md
      placeholder: "Add intent.md file link"
    validations:
      required: true

  - type: input
    id: requirements_md
    attributes:
      label: Requirements.md
      placeholder: "Add requirements.md file link"
    validations:
      required: true

  - type: input
    id: ui_prototype
    attributes:
      label: UI Prototype
      placeholder: "Add UI prototype link"
    validations:
      required: false

  - type: input
    id: testcases_md
    attributes:
      label: TestCases.md
      placeholder: "Add testcases.md file link"
    validations:
      required: true

  - type: input
    id: claude_session_link
    attributes:
      label: Claude Session Link
      placeholder: "Add the link to the relevant Claude conversation for reference"
    validations:
      required: false

  - type: textarea
    id: supporting_documentation
    attributes:
      label: Supporting Documentation
      placeholder: "Add supporting documentation"
    validations:
      required: false

  - type: checkboxes
    id: acceptance_criteria
    attributes:
      label: Acceptance Criteria
      options:
        - label: All fields and actions in REQUIREMENTS.md are present
        - label: All four state types implemented (loading, empty, error, permission-denied)
        - label: Role-based actions work correctly for all roles in spec
        - label: Pre-merge quality checklist completed
        - label: Tech lead approval
    validations:
      required: false

  - type: textarea
    id: attachments
    attributes:
      label: Attachments
      placeholder: "Add Attachments"
    validations:
      required: false

  - type: checkboxes
    id: stakeholder_confirmation
    attributes:
      label: Stakeholder Confirmation
      options:
        - label: BA
        - label: PO
        - label: Dev - API
        - label: Dev - UI
        - label: QA
    validations:
      required: false

  - type: textarea
    id: pr_notes
    attributes:
      label: PR Notes
      placeholder: "Add PR notes"
    validations:
      required: false

  - type: textarea
    id: qa_notes
    attributes:
      label: QA Notes
      placeholder: "Add QA notes"
    validations:
      required: false

  - type: textarea
    id: dev_notes
    attributes:
      label: Dev Notes
      placeholder: "Add any additional Dev details"
    validations:
      required: false

  - type: input
    id: estimated_hours
    attributes:
      label: Estimated Hours
      placeholder: "Example: 10, 20.5"
    validations:
      required: false

  - type: input
    id: actual_hours
    attributes:
      label: Actual Hours
      placeholder: "Example: 10, 20.5"
    validations:
      required: false
